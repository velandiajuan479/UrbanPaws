<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario PQRS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            /* Colores en forma Global para ser reutilizables*/
            --azul-urbano: #1a3a5c;
            --naranja-vital: #f58220;
            --azul-hielo: #e8f4fd;
            --gris-oscuro: #1f2937;
        }

        .header {
            background-color: var(--azul-urbano) !important;
        }
        .btn-primary {
            background-color: var(--azul-urbano) !important;
            border-color: var(--azul-urbano) !important;
        }
        .btn-secondary {
            background-color: var(--naranja-vital) !important;
            border-color: var(--naranja-vital) !important;
        }
        body {
            color: var(--gris-oscuro);
        }
        .btn-destacado {
            background-color: var(--naranja-vital) !important;
            border-color: var(--naranja-vital) !important;
        }
    </style>
</head>
<body class="bg-light">
    <header class="header text-white py-3">
        <div class="container">
            <h1 class="h4">Urban Paws</h1>
        </div>
    </header>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Generar PQRS</h4>
                    </div>
                    <div class="card-body">
                        <form id="formularioPQRS">
                            <div class="mb-3">
                                <label for="tipoPQRS" class="form-label">Tipo de PQRS</label>
                                <select class="form-select" id="tipoPQRS" required>
                                    <option value="" selected disabled>Seleccione un tipo...</option>
                                    <option value="peticion">Petición</option>
                                    <option value="queja">Queja</option>
                                    <option value="reclamo">Reclamo</option>
                                    <option value="sugerencia">Sugerencia</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="descripcion" class="form-label">Descripción de la PQRS</label>
                                <textarea class="form-control" id="descripcion" rows="4" placeholder="Describa detalladamente su solicitud..." required></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="fechaRadicacion" class="form-label">Fecha de Radicación</label>
                                <input type="date" class="form-control" id="fechaRadicacion" required>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" class="btn btn-secondary">Cancelar</button>
                                <button type="submit" class="btn btn-primary btn-destacado">Enviar PQRS</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p class="mb-0">&copy; 2026 Urban Paws. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
