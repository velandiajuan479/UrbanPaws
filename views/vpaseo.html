<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paseos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --azul-urbano: #1a3a5c;
            --naranja-vital: #f58220;
            --azul-hielo: #e8f4fd;
            --gris-oscuro: #1f2937;
        }

        .header {
            background-color: var(--azul-urbano);
        }
        .card-header {
            background-color: var(--azul-urbano);
            color: white;
        }
        .progress {
            height: 25px;
        }
        .progress-bar {
            background-color: var(--naranja-vital);
        }
        body {
            color: var(--gris-oscuro);
        }
    </style>
</head>
<body class="bg-light">
    <header class="header text-white py-3">
        <div class="container">
            <h1 class="h4">Sistema de Paseos</h1>
        </div>
    </header>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="card shadow">
                    <div class="card-header">
                        <h4 class="mb-0">Seguimiento del Paseo</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-4">
                            <h5>Estado del Paseo</h5>
                            <div class="progress">
                                <div class="progress-bar" role="progressbar" style="width: 65%;" aria-valuenow="65" aria-valuemin="0" aria-valuemax="100">En Progreso</div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Precio Inicial</label>
                                <p class="form-control-plaintext">$45,000</p>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Nombre del Dueño</label>
                                <p class="form-control-plaintext">María Rodríguez</p>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Código de Ruta</label>
                                <p class="form-control-plaintext">RUTA-2026-045</p>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Nombre del Paseador</label>
                                <p class="form-control-plaintext">Andrés López</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p class="mb-0">&copy; 2026 Urban Paws. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
